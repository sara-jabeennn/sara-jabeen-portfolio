<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 415" width="100%" role="img" aria-labelledby="qaTitle qaDesc">
<title id="qaTitle">QuickAid Bluetooth mesh routing and relay privacy</title>
<desc id="qaDesc">An SOS from a victim device with no cellular signal hops through nearby phones acting as relay nodes. Several routes exist; Dijkstra's algorithm selects the fewest-hop path to a device that still has connectivity. Relays forward the encrypted payload without decrypting or storing it.</desc>

<defs>
<marker id="qaArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#C97B96" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<g stroke="#68647a" stroke-width="1" opacity="0.5" fill="none">
<line x1="140" y1="198" x2="188" y2="92"/>
<line x1="140" y1="198" x2="188" y2="304"/>
<line x1="300" y1="92" x2="348" y2="145"/>
<line x1="300" y1="198" x2="348" y2="257"/>
<line x1="300" y1="304" x2="348" y2="257"/>
<line x1="460" y1="257" x2="518" y2="206"/>
</g>

<g stroke="#C97B96" stroke-width="2.5" fill="none" stroke-linecap="round">
<line x1="140" y1="198" x2="188" y2="198"/>
<line x1="300" y1="198" x2="348" y2="145"/>
<line x1="460" y1="145" x2="514" y2="190" marker-end="url(#qaArrow)"/>
</g>

<g>
<rect x="30" y="170" width="110" height="56" rx="10" fill="#1e1e2e" stroke="#C97B96" stroke-width="1.5"/>
<text x="85" y="190" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="500" fill="#C97B96">Victim device</text>
<text x="85" y="209" text-anchor="middle" font-family="'DM Mono','SF Mono',monospace" font-size="11" fill="#a8a4b8">SOS · no signal</text>
</g>

<g fill="#1e1e2e" stroke="#B189A8" stroke-width="1">
<rect x="190" y="64" width="110" height="56" rx="10"/>
<rect x="190" y="170" width="110" height="56" rx="10"/>
<rect x="190" y="276" width="110" height="56" rx="10"/>
<rect x="350" y="117" width="110" height="56" rx="10"/>
<rect x="350" y="229" width="110" height="56" rx="10"/>
</g>

<g text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="13" font-weight="500" fill="#B189A8">
<text x="245" y="88">Relay A</text>
<text x="245" y="194">Relay B</text>
<text x="245" y="300">Relay C</text>
<text x="405" y="141">Relay D</text>
<text x="405" y="253">Relay E</text>
</g>

<g text-anchor="middle" font-family="'DM Mono','SF Mono',monospace" font-size="11" fill="#a8a4b8">
<text x="245" y="107">no storage</text>
<text x="245" y="213">no storage</text>
<text x="245" y="319">no storage</text>
<text x="405" y="160">no storage</text>
<text x="405" y="272">no storage</text>
</g>

<g>
<rect x="520" y="170" width="110" height="56" rx="10" fill="#8B3D55" stroke="#C97B96" stroke-width="1"/>
<text x="575" y="190" text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="14" font-weight="500" fill="#f0ede8">Gateway</text>
<text x="575" y="209" text-anchor="middle" font-family="'DM Mono','SF Mono',monospace" font-size="11" fill="#e8dce2">has connectivity</text>
</g>

<g text-anchor="middle" font-family="'DM Sans',system-ui,sans-serif" font-size="12" fill="#a8a4b8">
<text x="340" y="372">Bold route = fewest hops, chosen by Dijkstra's shortest path</text>
<text x="340" y="392">Payload stays encrypted end to end — relays forward it, never read or retain it</text>
</g>
</svg>
